<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AgendaEscolar</title><style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0b0f1a;--surface:#131929;--card:#1a2235;--border:#ffffff0f;--accent:#4f8ef7;--accent2:#f7934f;--accent3:#4ff7a0;--danger:#f7504f;--text:#e8edf8;--muted:#6b7899;--radius:16px;--fh:'Trebuchet MS','Segoe UI',sans-serif;--fb:'Segoe UI',system-ui,sans-serif}body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.18;pointer-events:none;z-index:0;animation:orbFloat 8s ease-in-out infinite}.orb1{width:500px;height:500px;background:#4f8ef7;top:-200px;right:-100px}.orb2{width:400px;height:400px;background:#f7934f;bottom:-150px;left:-100px;animation-delay:3s}.orb3{width:300px;height:300px;background:#4ff7a0;top:40%;left:40%;animation-delay:6s}@keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}header{position:sticky;top:0;z-index:100;background:rgba(11,15,26,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}.logo{font-family:var(--fh);font-weight:700;font-size:1.4rem;display:flex;align-items:center;gap:.5rem}.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.date-badge{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.4rem .9rem;font-size:.85rem;color:var(--muted)}main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem}.hero{text-align:center;padding:3rem 1rem 2rem}.hero h1{font-family:var(--fh);font-size:clamp(2rem,5vw,3.5rem);font-weight:700;line-height:1.2;margin-bottom:1rem}.hero h1 .g{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gs 4s ease infinite}@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}.hero p{color:var(--muted);font-size:1.05rem;max-width:500px;margin:0 auto 2rem;line-height:1.7}.stats{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:3rem}.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem 1.5rem;text-align:center;min-width:110px}.stat-num{font-family:var(--fh);font-size:1.8rem;font-weight:700;display:block}.stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}#stt .stat-num{color:var(--accent)}#stp .stat-num{color:var(--accent2)}#std .stat-num{color:var(--accent3)}#stc .stat-num{color:var(--muted)}.fs{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:2rem}.fs h2{font-family:var(--fh);font-size:1.1rem;font-weight:700;margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}.fs h2::before{content:'';width:4px;height:1.1rem;background:linear-gradient(var(--accent),var(--accent2));border-radius:2px}.fg{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}.field{display:flex;flex-direction:column;gap:.4rem}.field label{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:500}input,select{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;color:var(--text);font-family:var(--fb);font-size:.95rem;transition:border-color .2s;width:100%}input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.15)}.btn-add{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;padding:.85rem;color:#fff;font-family:var(--fh);font-size:1rem;font-weight:700;cursor:pointer;transition:transform .15s;margin-top:.5rem}.btn-add:hover{transform:translateY(-2px)}.filters{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.5rem}.fb{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:.45rem 1.1rem;font-size:.85rem;color:var(--muted);cursor:pointer;transition:all .2s;font-family:var(--fb)}.fb:hover{border-color:var(--accent);color:var(--text)}.fb.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}.th{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}.tt{font-family:var(--fh);font-size:1.2rem;font-weight:700}.tc{font-size:.85rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:.2rem .8rem}#tl{display:flex;flex-direction:column;gap:.8rem}.tc2{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.4rem;display:flex;align-items:flex-start;gap:1rem;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}.tc2::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}.tc2.urgent::before{background:var(--danger)}.tc2.high::before{background:var(--accent2)}.tc2.medium::before{background:var(--accent)}.tc2.low::before{background:var(--accent3)}.tc2:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}.tc2.done{opacity:.5}.tc2.done .ttl{text-decoration:line-through;color:var(--muted)}.ck{width:22px;height:22px;min-width:22px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}.ck:hover{border-color:var(--accent3)}.ck.checked{background:var(--accent3);border-color:var(--accent3)}.ck.checked::after{content:'checkmark';content:'✓';color:#000;font-size:.75rem;font-weight:700}.tb{flex:1;min-width:0}.tm{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.3rem}.tsj{font-size:.75rem;font-weight:600;padding:.2rem .6rem;border-radius:6px;text-transform:uppercase;letter-spacing:.06em}.tty{font-size:.75rem;color:var(--muted);background:var(--surface);padding:.2rem .6rem;border-radius:6px}.ttl{font-family:var(--fh);font-size:1rem;font-weight:600;margin-bottom:.3rem;line-height:1.3}.ttr{font-size:.85rem;color:var(--muted);margin-bottom:.4rem}.tno{font-size:.85rem;color:var(--muted)}.tdu{margin-top:.5rem}.db{padding:.2rem .7rem;border-radius:20px;font-size:.75rem;font-weight:500}.dt{background:rgba(247,147,79,.2);color:var(--accent2)}.dm{background:rgba(79,142,247,.2);color:var(--accent)}.do{background:rgba(247,80,79,.2);color:var(--danger)}.ds{background:rgba(79,247,160,.15);color:var(--accent3)}.df{background:rgba(107,120,153,.15);color:var(--muted)}.ta{display:flex;flex-direction:column;gap:.4rem;align-items:flex-end}.bd{background:none;border:1px solid transparent;border-radius:8px;color:var(--muted);cursor:pointer;padding:.3rem .5rem;font-size:1rem;transition:all .2s}.bd:hover{border-color:var(--danger);color:var(--danger)}.pd{width:8px;height:8px;border-radius:50%;margin-top:8px}.pd.urgent{background:var(--danger)}.pd.high{background:var(--accent2)}.pd.medium{background:var(--accent)}.pd.low{background:var(--accent3)}.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.5}.cb{background:linear-gradient(135deg,rgba(79,142,247,.12),rgba(247,147,79,.12));border:1px solid rgba(79,142,247,.25);border-radius:var(--radius);padding:1.5rem;margin-top:3rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}.cb h3{font-family:var(--fh);font-size:1rem;font-weight:700;margin-bottom:.3rem}.cb p{font-size:.85rem;color:var(--muted)}.cbb{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;padding:.65rem 1.3rem;color:#fff;font-family:var(--fh);font-weight:700;font-size:.9rem;cursor:pointer;text-decoration:none;white-space:nowrap}.sm-mat{background:rgba(79,142,247,.2);color:#7eb3ff}.sm-esp{background:rgba(247,147,79,.2);color:#ffa96b}.sm-cien{background:rgba(79,247,160,.2);color:#6bffb8}.sm-hist{background:rgba(247,80,79,.2);color:#ff7f7e}.sm-ing{background:rgba(255,220,79,.2);color:#ffe07e}.sm-arte{background:rgba(200,79,247,.2);color:#d47eff}.sm-edu{background:rgba(79,220,247,.2);color:#7ee8ff}.sm-otro{background:rgba(107,120,153,.2);color:#9aa3be}.toast{position:fixed;bottom:2rem;right:2rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.8rem 1.2rem;font-size:.9rem;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1)}.toast.show{transform:translateY(0);opacity:1}@media(max-width:600px){.fg{grid-template-columns:1fr}header{padding:.8rem 1rem}main{padding:1rem 1rem 3rem}.cb{flex-direction:column;text-align:center}}</style></head><body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<div class="toast" id="toast"></div>
<header><div class="logo"><div class="logo-icon">📚</div><span>AgendaEscolar</span></div><div class="date-badge" id="hd"></div></header>
<main>
<div class="hero"><h1>Nunca olvides<br><span class="g">una tarea otra vez</span></h1><p>Organiza tus tareas, trabajos y proyectos escolares en un solo lugar.</p></div>
<div class="stats"><div class="stat" id="stt"><span class="stat-num" id="nt">0</span><span class="stat-label">Total</span></div><div class="stat" id="stp"><span class="stat-num" id="np">0</span><span class="stat-label">Pendientes</span></div><div class="stat" id="std"><span class="stat-num" id="nd">0</span><span class="stat-label">Para hoy</span></div><div class="stat" id="stc"><span class="stat-num" id="nc">0</span><span class="stat-label">Completadas</span></div></div>
<div class="fs"><h2>Agregar tarea</h2><div class="fg">
<div class="field"><label>Materia</label><select id="fs"><option value="mat">📐 Matemáticas</option><option value="esp">📖 Español</option><option value="cien">🔬 Ciencias</option><option value="hist">🌍 Historia</option><option value="ing">🇺🇸 Inglés</option><option value="arte">🎨 Arte</option><option value="edu">⚽ Ed. Física</option><option value="otro">📌 Otra</option></select></div>
<div class="field"><label>Profe</label><input type="text" id="ft" placeholder="ej: Prof. García"></div>
<div class="field" style="grid-column:1/-1"><label>Descripción</label><input type="text" id="fi" placeholder="ej: Cartulina sobre la Revolución Francesa"></div>
<div class="field"><label>Tipo</label><select id="fty"><option>📝 Tarea</option><option>🗂 Trabajo</option><option>🚀 Proyecto</option><option>📋 Examen</option><option>🖼 Cartulina</option><option>📄 Informe</option><option>🏗 Maqueta</option><option>🎤 Exposición</option></select></div>
<div class="field"><label>Prioridad</label><select id="fp"><option value="medium">🟡 Normal</option><option value="high">🟠 Alta</option><option value="urgent">🔴 Urgente</option><option value="low">🟢 Baja</option></select></div>
<div class="field"><label>Fecha</label><input type="date" id="fd"></div>
<div class="field"><label>Notas</label><input type="text" id="fn" placeholder="ej: en parejas, traer materiales..."></div>
</div><button class="btn-add" onclick="add()">+ Agregar tarea</button></div>
<div class="filters"><button class="fb active" onclick="sf('all',this)">Todas</button><button class="fb" onclick="sf('pending',this)">Pendientes</button><button class="fb" onclick="sf('today',this)">Hoy</button><button class="fb" onclick="sf('urgent',this)">🔴 Urgentes</button><button class="fb" onclick="sf('done',this)">✅ Listas</button></div>
<div class="th"><span class="tt">📋 Mis tareas</span><span class="tc" id="cnt">0 tareas</span></div>
<div id="tl"></div>
<div class="cb"><div><h3>🧮 Calcula tu promedio escolar</h3><p>Gratis, sin registro, al instante.</p></div><a href="https://bfriasdicent-oss.github.io/calculadora-promedio-escolar/" target="_blank" class="cbb">Ir a la calculadora →</a></div>
</main>
<script>
let tasks=JSON.parse(localStorage.getItem('ag')||'[]');
let cf='all';
const sn={mat:'Matemáticas',esp:'Español',cien:'Ciencias',hist:'Historia',ing:'Inglés',arte:'Arte',edu:'Ed. Física',otro:'Otra'};
const sc={mat:'sm-mat',esp:'sm-esp',cien:'sm-cien',hist:'sm-hist',ing:'sm-ing',arte:'sm-arte',edu:'sm-edu',otro:'sm-otro'};
function fd(){const d=new Date();const D=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];const M=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return`<strong>${D[d.getDay()]}</strong>, ${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`}
document.getElementById('hd').innerHTML=fd();
document.getElementById('fd').value=new Date().toISOString().split('T')[0];
function due(ds){if(!ds)return{l:'Sin fecha',c:'df'};const d=new Date(ds+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);const x=Math.floor((d-n)/864e5);if(x<0)return{l:'⚠️ Vencida',c:'do'};if(x===0)return{l:'🔥 Hoy',c:'dt'};if(x===1)return{l:'⏰ Mañana',c:'dm'};if(x<=3)return{l:`En ${x} días`,c:'ds'};return{l:d.toLocaleDateString('es',{day:'numeric',month:'short'}),c:'df'}}
function add(){const v=document.getElementById('fi').value.trim();if(!v){toast('❗ Escribe la tarea','e');return}tasks.unshift({id:Date.now(),title:v,subj:document.getElementById('fs').value,teacher:document.getElementById('ft').value.trim(),type:document.getElementById('fty').value,pri:document.getElementById('fp').value,date:document.getElementById('fd').value,notes:document.getElementById('fn').value.trim(),done:false});save();document.getElementById('fi').value='';document.getElementById('ft').value='';document.getElementById('fn').value='';render();toast('✅ Tarea agregada','s')}
function tog(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();render()}}
function del(id){tasks=tasks.filter(t=>t.id!==id);save();render();toast('🗑 Eliminada','e')}
function sf(f,b){cf=f;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}
function gf(){const n=new Date();n.setHours(0,0,0,0);return tasks.filter(t=>{if(cf==='pending')return!t.done;if(cf==='done')return t.done;if(cf==='urgent')return!t.done&&t.pri==='urgent';if(cf==='today'){if(!t.date)return false;return new Date(t.date+'T00:00:00').getTime()===n.getTime()}return true})}
function render(){const f=gf();const n=new Date();n.setHours(0,0,0,0);document.getElementById('nt').textContent=tasks.length;document.getElementById('np').textContent=tasks.filter(t=>!t.done).length;document.getElementById('nd').textContent=tasks.filter(t=>{if(!t.date||t.done)return false;return new Date(t.date+'T00:00:00').getTime()===n.getTime()}).length;document.getElementById('nc').textContent=tasks.filter(t=>t.done).length;document.getElementById('cnt').textContent=`${f.length} tarea${f.length!==1?'s':''}`;const l=document.getElementById('tl');if(!f.length){l.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>No hay tareas. ¡Agrega una!</p></div>';return}const s=[...f].sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;if(!a.date)return 1;if(!b.date)return-1;return new Date(a.date)-new Date(b.date)});l.innerHTML=s.map(t=>{const d=due(t.date);return`<div class="tc2 ${t.pri} ${t.done?'done':''}"><div class="ck ${t.done?'checked':''}" onclick="tog(${t.id})"></div><div class="tb"><div class="tm"><span class="tsj ${sc[t.subj]||'sm-otro'}">${sn[t.subj]||'Otra'}</span><span class="tty">${t.type}</span></div><div class="ttl">${t.title}</div>${t.teacher?`<div class="ttr">👨‍🏫 ${t.teacher}</div>`:''}${t.notes?`<div class="tno">📌 ${t.notes}</div>`:''}<div class="tdu"><span class="db ${d.c}">${d.l}</span></div></div><div class="ta"><button class="bd" onclick="del(${t.id})">🗑</button><div class="pd ${t.pri}"></div></div></div>`}).join('')}
function save(){localStorage.setItem('ag',JSON.stringify(tasks))}
function toast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className=`toast show`;setTimeout(()=>e.classList.remove('show'),2500)}
document.getElementById('fi').addEventListener('keydown',e=>{if(e.key==='Enter')add()});
render();
</script></body></html>
